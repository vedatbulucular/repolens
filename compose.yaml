name: repolens

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    command: pnpm dev --hostname 0.0.0.0
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web/app:/workspace/apps/web/app
      - web_next_cache:/workspace/apps/web/.next
    networks:
      - frontend
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./apps/api
      target: development
    command:
      - uvicorn
      - repolens_api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - src
      - --app-dir
      - src
    environment:
      REPOLENS_API_DEBUG: ${REPOLENS_API_DEBUG:-false}
      REPOLENS_API_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens-local}@postgres:5432/${POSTGRES_DB:-repolens}
      REPOLENS_API_REDIS_URL: redis://redis:6379/0
      REPOLENS_API_BROKER_VISIBILITY_TIMEOUT_SECONDS: ${REPOLENS_API_BROKER_VISIBILITY_TIMEOUT_SECONDS:-300}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    networks:
      - frontend
      - data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./apps/api
      target: worker-development
    command:
      - celery
      - --app
      - repolens_api.celery_app:celery_app
      - worker
      - --loglevel
      - info
      - --concurrency
      - "${REPOLENS_WORKER_CONCURRENCY:-2}"
    environment:
      HOME: /tmp/repolens-runtime
      TEMP: /tmp/repolens-runtime
      TMP: /tmp/repolens-runtime
      TMPDIR: /tmp/repolens-runtime
      REPOLENS_API_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens-local}@postgres:5432/${POSTGRES_DB:-repolens}
      REPOLENS_API_REDIS_URL: redis://redis:6379/0
      REPOLENS_API_BROKER_VISIBILITY_TIMEOUT_SECONDS: ${REPOLENS_API_BROKER_VISIBILITY_TIMEOUT_SECONDS:-300}
      REPOLENS_API_ACQUISITION_TIMEOUT_SECONDS: ${REPOLENS_API_ACQUISITION_TIMEOUT_SECONDS:-60}
      REPOLENS_API_MAX_REPOSITORY_BYTES: ${REPOLENS_API_MAX_REPOSITORY_BYTES:-104857600}
      REPOLENS_API_MAX_WORKSPACE_BYTES: ${REPOLENS_API_MAX_WORKSPACE_BYTES:-268435456}
      REPOLENS_API_MAX_FILE_COUNT: ${REPOLENS_API_MAX_FILE_COUNT:-20000}
      REPOLENS_API_MAX_FILE_BYTES: ${REPOLENS_API_MAX_FILE_BYTES:-5242880}
      REPOLENS_API_MAX_PATH_LENGTH: ${REPOLENS_API_MAX_PATH_LENGTH:-512}
      REPOLENS_API_MAX_PATH_DEPTH: ${REPOLENS_API_MAX_PATH_DEPTH:-40}
      REPOLENS_API_WORKSPACE_ROOT: /tmp/repolens-workspaces
    volumes:
      - ./apps/api/src:/app/src:ro
    user: "65534:65534"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: on-failure:3
    stop_grace_period: "${REPOLENS_WORKER_STOP_GRACE_PERIOD:-90s}"
    mem_limit: "${REPOLENS_WORKER_MEMORY_LIMIT:-1536m}"
    cpus: "${REPOLENS_WORKER_CPU_LIMIT:-2.0}"
    pids_limit: ${REPOLENS_WORKER_PIDS_LIMIT:-64}
    shm_size: "${REPOLENS_WORKER_SHM_SIZE:-64m}"
    tmpfs:
      - /tmp/repolens-workspaces:size=${REPOLENS_WORKER_WORKSPACE_TMPFS_SIZE:-671088640},mode=0700,uid=65534,gid=65534,noexec,nosuid,nodev
      - /tmp/repolens-runtime:size=${REPOLENS_WORKER_RUNTIME_TMPFS_SIZE:-67108864},mode=0700,uid=65534,gid=65534,noexec,nosuid,nodev
    networks:
      - worker-data
      - worker-egress
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os, shutil, subprocess, sys; command = ['celery', '--app', 'repolens_api.celery_app:celery_app', 'inspect', 'registered', '--destination', 'celery@' + os.environ['HOSTNAME'], '--timeout', '5']; result = subprocess.run(command, capture_output=True, text=True, timeout=8, check=False); sys.exit(0 if shutil.which('git') and result.returncode == 0 and 'repolens.process_analysis' in result.stdout else 1)",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repolens}
      POSTGRES_USER: ${POSTGRES_USER:-repolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repolens-local}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data
      - worker-data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - data
      - worker-data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  web_next_cache:

networks:
  frontend:
  data:
    internal: true
  worker-data:
    internal: true
  worker-egress:
