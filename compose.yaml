name: repolens

services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: development
    command: pnpm dev --hostname 0.0.0.0
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./apps/web/app:/workspace/apps/web/app
      - web_next_cache:/workspace/apps/web/.next
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000').then((response) => { if (!response.ok) process.exit(1) }).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    build:
      context: ./apps/api
      target: development
    command:
      - uvicorn
      - repolens_api.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
      - --reload-dir
      - src
      - --app-dir
      - src
    environment:
      REPOLENS_API_DEBUG: ${REPOLENS_API_DEBUG:-false}
      REPOLENS_API_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens-local}@postgres:5432/${POSTGRES_DB:-repolens}
      REPOLENS_API_REDIS_URL: redis://redis:6379/0
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ./apps/api
      target: worker-development
    command:
      - celery
      - --app
      - repolens_api.celery_app:celery_app
      - worker
      - --loglevel
      - info
      - --concurrency
      - "2"
    environment:
      REPOLENS_API_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-repolens}:${POSTGRES_PASSWORD:-repolens-local}@postgres:5432/${POSTGRES_DB:-repolens}
      REPOLENS_API_REDIS_URL: redis://redis:6379/0
      REPOLENS_API_ACQUISITION_TIMEOUT_SECONDS: ${REPOLENS_API_ACQUISITION_TIMEOUT_SECONDS:-60}
      REPOLENS_API_MAX_REPOSITORY_BYTES: ${REPOLENS_API_MAX_REPOSITORY_BYTES:-104857600}
      REPOLENS_API_MAX_WORKSPACE_BYTES: ${REPOLENS_API_MAX_WORKSPACE_BYTES:-268435456}
      REPOLENS_API_MAX_FILE_COUNT: ${REPOLENS_API_MAX_FILE_COUNT:-20000}
      REPOLENS_API_MAX_FILE_BYTES: ${REPOLENS_API_MAX_FILE_BYTES:-5242880}
      REPOLENS_API_MAX_PATH_LENGTH: ${REPOLENS_API_MAX_PATH_LENGTH:-512}
      REPOLENS_API_MAX_PATH_DEPTH: ${REPOLENS_API_MAX_PATH_DEPTH:-40}
      REPOLENS_API_WORKSPACE_ROOT: ${REPOLENS_API_WORKSPACE_ROOT:-/tmp/repolens-workspaces}
    volumes:
      - ./apps/api:/app
    user: "65534:65534"
    tmpfs:
      - /tmp/repolens-workspaces:size=671088640,mode=0700,uid=65534,gid=65534
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "git --version >/dev/null 2>&1 && celery --app repolens_api.celery_app:celery_app inspect registered --destination celery@$${HOSTNAME} --timeout 5 | grep --quiet repolens.process_analysis",
        ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-repolens}
      POSTGRES_USER: ${POSTGRES_USER:-repolens}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-repolens-local}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  web_next_cache:
