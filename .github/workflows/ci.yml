name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Install Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv --directory apps/api sync --locked --all-groups

      - name: Check Ruff formatting
        run: uv --directory apps/api run ruff format --check .

      - name: Run Ruff lint
        run: uv --directory apps/api run ruff check .

      - name: Run mypy
        run: uv --directory apps/api run mypy src tests

      - name: Run backend tests
        run: uv --directory apps/api run pytest

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint:web

      - name: Run TypeScript type-check
        run: pnpm type-check:web

      - name: Run frontend tests
        run: pnpm test:web

      - name: Build frontend
        run: pnpm build:web
